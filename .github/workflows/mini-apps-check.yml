name: Mini-apps convention check

on:
  pull_request:
    paths:
      - 'src/app/mini-apps/**'
      - 'scripts/check-mini-apps.mjs'
      - '.github/workflows/mini-apps-check.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run mini-app convention check
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: node scripts/check-mini-apps.mjs
